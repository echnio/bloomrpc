name: Build macOS arm64

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - run: yarn test --runInBand
      - run: yarn package-mac-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: BloomRPC-arm64
          path: |
            release/*-arm64.dmg
            release/*-arm64-mac.zip
          if-no-files-found: error
